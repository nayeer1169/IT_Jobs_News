name: Daily IT Jobs News Reports

on:
  schedule:
    # Run every day at 10:00 PM IST (16:30 UTC)
    - cron: '30 16 * * *'
  workflow_dispatch: # Allows triggering the automation manually from the GitHub UI

permissions:
  contents: write

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate Reports
        run: |
          python generate_reports.py

      - name: Commit and Push Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No new reports generated to commit."
          else
            # Extract current IST date for the commit message
            IST_DATE=$(python3 -c "from datetime import datetime, timezone, timedelta; print(datetime.now(timezone(timedelta(hours=5, minutes=30))).strftime('%Y-%m-%d'))")
            git commit -m "Add IT jobs news reports for $IST_DATE"
            git push origin main
          fi
